<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Slot Machine</title>
<script src="/public/dist/gsap.min.js"></script>
<link rel="stylesheet" href="./src/styles/slot-machine.css" />
</head>

<body class="admin-page">

<div class="machine">
  <div class="reel"><div class="strip" id="r0"></div></div>
  <div class="reel"><div class="strip" id="r1"></div></div>
  <div class="reel"><div class="strip" id="r2"></div></div>
</div>

<div class="controls">
  <button id="startBtn">Start</button>
  <button id="stopBtn">Stop</button>
</div>

<div class="controls">
  <input id="a" placeholder="1-6">
  <input id="b" placeholder="1-6">
  <input id="c" placeholder="1-6">
  <button id="forceBtn">Force</button>
</div>
<div class="legend" id="legend"></div>
<div id="countdown">0.0s</div>
<div id="eventStatus">Last event: none</div>
<div class="ws-wrap"><span id="wsStatus">⚫ WS</span></div>

<script src="./src/slot-machine-core.js"></script>
<script src="./src/admin-page.js"></script>

</body>
</html>
